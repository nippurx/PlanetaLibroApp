<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tablero OpenSpec · PlanetaLibroApp</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main>
    <header class="hero">
      <div><p class="eyebrow">PlanetaLibroApp · ejecución</p><h1>Panel de ejecución</h1><p>Estado real de los changes y tareas leídos desde OpenSpec.</p></div>
      <p class="readonly">Las tareas son de solo lectura aquí.<br>Su fuente de verdad es <code>tasks.md</code>.</p>
    </header>

    <section id="overview" class="overview" aria-label="Resumen operativo"></section>
    <section id="recommendation" class="recommendation" aria-label="Siguiente trabajo recomendado"></section>

    <section class="toolbar" aria-label="Filtros del tablero">
      <label class="search"><span>Buscar change</span><input id="search" type="search" placeholder="Nombre del change…"></label>
      <label><span>Ubicación</span><select id="location-filter"><option value="">Todas</option><option value="active">Activos</option><option value="archived">Archivados</option></select></label>
      <label><span>Trabajo</span><select id="work-filter"><option value="">Todo</option><option value="pending">Con tareas pendientes</option><option value="blocked">Bloqueado</option><option value="complete">Sin tareas pendientes</option><option value="unavailable">Tareas no disponibles</option></select></label>
      <label><span>Orden</span><select id="sort"><option value="recommendation">Prioridad operativa</option><option value="pending">Más tareas pendientes</option><option value="progress">Menor avance</option><option value="name">Nombre</option></select></label>
    </section>

    <p id="feedback" class="feedback" role="status" aria-live="polite">Cargando el estado OpenSpec…</p>
    <section id="changes" class="changes" aria-label="Changes OpenSpec"></section>
    <section id="empty" class="empty" hidden><h2>No hay changes que coincidan</h2><p>Probá ajustar los filtros.</p></section>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
