<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding Personalization</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 sm:p-8">
<div class="w-full max-w-[640px] flex flex-col gap-8">
<!-- Progress Bar Section -->
<div class="flex flex-col gap-3">
<div class="flex gap-6 justify-between items-center">
<button class="group p-2 -ml-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-white">arrow_back</span>
</button>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium leading-normal">Step 3 of 5</p>
<button class="p-2 -mr-2 text-primary font-medium text-sm hover:underline">Skip</button>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-500 ease-out" style="width: 60%;"></div>
</div>
</div>
<!-- Header Section -->
<div class="text-center space-y-3 px-4">
<h1 class="text-3xl md:text-4xl font-bold tracking-tight text-slate-900 dark:text-white">Personalize your library</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg max-w-md mx-auto">Select your favorite genres and moods to get better sustainable reading recommendations.</p>
</div>
<!-- Selection Area -->
<div class="flex flex-col gap-8">
<!-- Genres Section -->
<div class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary">menu_book</span>
<h2 class="text-xl font-semibold text-slate-900 dark:text-white">Favorite Genres</h2>
</div>
<div class="flex flex-wrap gap-3">
<!-- Selected Item -->
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-primary px-5 transition-all hover:bg-blue-600 active:scale-95">
<span class="text-white text-sm font-medium">Fiction</span>
<span class="material-symbols-outlined text-white text-[18px]">check</span>
</button>
<!-- Unselected Items -->
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Non-fiction</span>
<span class="material-symbols-outlined text-slate-400 text-[18px] opacity-0 group-hover:opacity-100 transition-opacity">add</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Sci-Fi</span>
<span class="material-symbols-outlined text-slate-400 text-[18px] opacity-0 group-hover:opacity-100 transition-opacity">add</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-primary px-5 transition-all hover:bg-blue-600 active:scale-95">
<span class="text-white text-sm font-medium">Sustainability</span>
<span class="material-symbols-outlined text-white text-[18px]">check</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">History</span>
<span class="material-symbols-outlined text-slate-400 text-[18px] opacity-0 group-hover:opacity-100 transition-opacity">add</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Biography</span>
<span class="material-symbols-outlined text-slate-400 text-[18px] opacity-0 group-hover:opacity-100 transition-opacity">add</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Self-help</span>
<span class="material-symbols-outlined text-slate-400 text-[18px] opacity-0 group-hover:opacity-100 transition-opacity">add</span>
</button>
</div>
</div>
<!-- Moods Section -->
<div class="space-y-4">
<div class="flex items-center gap-2 px-1">
<span class="material-symbols-outlined text-primary">mood</span>
<h2 class="text-xl font-semibold text-slate-900 dark:text-white">Current Moods</h2>
</div>
<div class="flex flex-wrap gap-3">
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Inspirador</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-primary/20 border border-primary/50 px-5 transition-all hover:bg-primary/30 active:scale-95">
<span class="text-primary dark:text-primary-400 text-sm font-medium">Relajado</span>
<span class="material-symbols-outlined text-primary text-[18px]">check</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Intenso</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Corto</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Largo</span>
</button>
<button class="group flex h-10 items-center justify-center gap-x-2 rounded-full bg-slate-200 dark:bg-slate-800 px-5 transition-all hover:bg-slate-300 dark:hover:bg-slate-700 active:scale-95">
<span class="text-slate-700 dark:text-slate-300 text-sm font-medium">Educativo</span>
</button>
</div>
</div>
</div>
<!-- Footer / Action -->
<div class="pt-6 border-t border-slate-200 dark:border-slate-800 mt-4 flex justify-end">
<button class="flex items-center justify-center rounded-xl bg-primary px-8 py-3 text-base font-bold text-white shadow-lg shadow-primary/20 transition-all hover:bg-blue-600 hover:shadow-primary/40 active:scale-95 w-full sm:w-auto">
<span class="mr-2">Siguiente</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
